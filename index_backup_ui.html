<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리동네라이프플러스</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#f5f7fb;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.benefit{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:8px;
}

h1{
color:#333;
} </style>

</head>
<body>

<div class="card">
    <h1>우리동네라이프플러스</h1>

```
<p>놓치고 있는 혜택과 지원금을 찾아드립니다.</p>

<h3>등록 혜택 수</h3>
<h2 id="benefitCount">0</h2>

<h3>총 지원금 규모</h3>
<h2 id="savingAmount">0원</h2>
```

</div>

<div class="card">
    <h3>혜택 목록</h3>
    <div id="benefits"></div>
</div>

<script>

async function loadStats(){

    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("benefitCount").innerText =
        data.benefit_count || 0;

    document.getElementById("savingAmount").innerText =
        (data.total_amount || 0).toLocaleString() + "원";
}

async function loadBenefits(){

    const res =
        await fetch("/api/master-benefits");

    const data =
        await res.json();

    let html = "";

    data.forEach(item => {

        html += `
        <div class="benefit">
            <h4>${item.title}</h4>
            <p>지역 : ${item.region}</p>
            <p>분류 : ${item.category}</p>
            <p>지원금 : ${item.amount.toLocaleString()}원</p>
        </div>
        `;
    });

    document.getElementById("benefits").innerHTML = html;
}

loadStats();
loadBenefits();

</script>

</body>
</html>
