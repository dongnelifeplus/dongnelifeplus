<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리동네라이프플러스</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:auto;
    padding:20px;
    background:#f5f7fb;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.benefit{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

#benefits{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

.unknown{
color:orange;
font-weight:bold;
}

.score{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

h1{
color:#333;
}

.completion-card{
    margin-top:10px;
    margin-bottom:15px;
}

.progress{
    width:100%;
    height:12px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:12px;
    width:0%;
    border-radius:20px;
    transition:0.5s;
    background:#4CAF50;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-top:20px;
}

.dashboard-item{
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    border:1px solid #eee;
}

.dashboard-item h3{
    font-size:16px;
    margin-bottom:10px;
}

.dashboard-item h2{
    color:#2563eb;
}

</style>

</head>
<body>

<div class="card">
    <h1>우리동네라이프플러스</h1>

<p>놓치고 있는 혜택과 지원금을 찾아드립니다.</p>

<div class="dashboard">

    <div class="dashboard-item">

        <h3>💰 내 예상 혜택 가치</h3>

        <h2 id="lifeAsset">
            계산중...
        </h2>

    </div>

    <div class="dashboard-item">

        <h3>🎁 발견된 혜택</h3>

        <h2 id="foundBenefitCount">
            0건
        </h2>

    </div>

    <div class="dashboard-item">

        <h3>⚡ 지금 신청 가능</h3>

        <h2 id="readyBenefitCount">
            0건
        </h2>

    </div>


</div>

<div class="card">

<h2>👤 내 프로필</h2>

<p>
프로필 완성도
<span id="profileCompletion">
33%
</span>
</p>

<div class="completion-card">

    <div class="progress">

        <div
            id="profile-progress"
            class="progress-bar">
        </div>

    </div>

</div>

<button
onclick="location.href='/profile'"
style="
margin-left:10px;
font-size:12px;
padding:4px 8px;
"
>
⚡ 프로필 완성하기
</button>

</p>

<p>
추천 정확도
<span id="recommendationAccuracy">
0%
</span>
</p>

<p>
발견 혜택
<span id="foundBenefits">
6건
</span>
</p>

<p>
미입력 정보
<span id="missingInfo">
0건
</span>
</p>

<div id="missingInfoList">
</div>
<div class="card">

<h3>
📋 지금 하면 좋은 일
</h3>

<div id="todoList">

불러오는 중...

</div>

</div>

<div class="card">

<h3>혜택 목록</h3>

<div id="benefits"></div>

</div>

<script>

async function loadStats(){

    const res = await fetch("/api/stats");
    const data = await res.json();

    document.getElementById("benefitCount").innerText =
        data.benefit_count || 0;

    document.getElementById("savingAmount").innerText =
        (data.total_amount || 0).toLocaleString() + "원";
}

async function loadBenefits(){

    const benefitRes =
        await fetch("/api/master-benefits");

    const benefits =
        await benefitRes.json();

    const eligibilityRes =
        await fetch("/api/eligibility");

    const eligibility =
        await eligibilityRes.json();

    let html = "";

    benefits.forEach((item,index) => {

        const score = eligibility[index];

        let badge = "🔴";

        if(score.rate >= 100){
            badge = "🟢";
        }
        else if(score.rate > 0){
            badge = "🟡";
        }

        html += `
        <div class="benefit">

            <h3>${item.title}</h3>

            <div class="score">
                ${badge}
                자격 충족률 ${score.rate}%
            </div>

            <p>
                조건 총 ${score.total}건
            </p>

            <p>
                <span class="pass">충족 ${score.pass}건</span> /
                <span class="fail">미충족 ${score.fail}건</span> /
                <span class="unknown">미확인 ${score.unknown}건</span>
            </p>

            <hr>

            ${score.details.map(d => {

                if(d.result === "pass"){
                    return `<p class="pass">✓ ${d.label}</p>`;
                }

                if(d.result === "fail"){
                    return `<p class="fail">✗ ${d.label}</p>`;
                }

                    return `<p class="unknown">? ${d.label}</p>`;

            }).join("")}

            <hr>

            <p>
                지원금 :
                ${item.amount.toLocaleString()}원
            </p>

            <p>
                현재 상태
            </p>

            <select>
                <option>발견</option>
                <option>검토중</option>
                <option>신청가능</option>
                <option>신청완료</option>
                <option>수령완료</option>
            </select>

            <br><br>

            <button>
                상세정보 입력
            </button>

        </div>
        `;
    });

        document.getElementById(
        "benefits"
    ).innerHTML = html;
}

async function loadProfileCompletion(){

    const response =
        await fetch(
            "/api/profile-completion"
        );

    const data =
        await response.json();

    document.getElementById(
        "profileCompletion"
    ).innerText =
        data.completion + "%";

    const progressBar =
        document.getElementById(
            "profile-progress"
        );

    if(progressBar){

        progressBar.style.width =
            data.completion + "%";

    }

    const accuracy =
        Math.min(
            100,
            data.completion + 20
        );

    const accuracyEl =
        document.getElementById(
            "recommendationAccuracy"
        );

    if(accuracyEl){

        accuracyEl.innerText =
            accuracy + "%";

    }

    const missingEl =
        document.getElementById(
            "missingInfo"
        );

    if(missingEl){

        missingEl.innerText =
            data.missing.length + "건";

    }

    const listEl =
        document.getElementById(
            "missingInfoList"
        );

    if(listEl){

        let html =
            `<p>🟡 미확인 정보 ${data.missing.length}건</p><ul>`;

        data.missing.forEach(item => {

            html +=
                `<li>${item}</li>`;

        });

        html += "</ul>";

        listEl.innerHTML =
            html;

        loadTodoList(data);

    }

}
function loadTodoList(data){

    const todoEl =
        document.getElementById(
            "todoList"
        );

    if(!todoEl){
        return;
    }

    let html = "";

    data.missing.forEach(item => {

        html += `
        <div style="
            padding:10px;
            margin-bottom:10px;
            background:#fff8e8;
            border-radius:8px;
        ">

            <p>
                ${item}
            </p>

            <button
                onclick="goProfile('${item}')"
    >
                확인하기
            </button>

        </div>
        `;

    });

    todoEl.innerHTML = html;

}

async function loadDashboard(){

    const response =
        await fetch(
            "/api/master-benefits"
        );

    const benefits =
        await response.json();

    let totalAmount = 0;

    benefits.forEach(item => {

        totalAmount += item.amount;

    });

    document.getElementById(
        "lifeAsset"
    ).innerText =
        totalAmount.toLocaleString()
        + "원";

    document.getElementById(
        "foundBenefitCount"
    ).innerText =
        benefits.length + "건";

    document.getElementById(
        "readyBenefitCount"
    ).innerText =
        Math.floor(
            benefits.length * 0.3
        ) + "건";

}

function showAccuracyPopup(){

alert(
    "정확도 향상\n\n" +
    "현재 정확도 : 67%\n\n" +
    "추가 확인 필요\n" +
    "- 무주택 여부\n" +
    "- 건강보험료\n" +
    "- 자녀 수\n\n" +
    "확인 시\n" +
    "67% → 100%\n\n" +
    "예상 추가 혜택 : +3건\n" +
    "예상 추가 가치 : +240만원"
);

}
function showAccuracyPopup(){

alert(
    "정확도 향상\n\n" +
    "현재 정확도 : 67%\n\n" +
    "추가 확인 필요\n" +
    "- 무주택 여부\n" +
    "- 건강보험료\n" +
    "- 자녀 수\n\n" +
    "확인 시\n" +
    "67% → 100%\n\n" +
    "예상 추가 혜택 : +3건\n" +
    "예상 추가 가치 : +240만원"
);

}

function goProfile(field){

    localStorage.setItem(
        "focusField",
        field
    );

    location.href =
        "/profile";

}

loadBenefits();
loadProfileCompletion();
loadDashboard();

</script>

</body>
</html>
