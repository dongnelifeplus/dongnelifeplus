<h1>나만 모르는 숨은 돈</h1>
<p>개인도 사업자도 놓친 혜택을 찾아드립니다</p>

<div class="card">
    <h2>내 정보로 숨은 혜택 찾기</h2>
    <button onclick="showPersonalForm()">개인 숨은 돈 찾기</button>
    <button onclick="showBusinessForm()">사업자 숨은 돈 찾기</button>
</div>

<!-- 개인 폼 -->
<div id="personalForm" style="display:none;">
    <!-- 이름, 나이, 지역, 가족정보 등 -->
</div>

<!-- 사업자 폼 -->
<div id="businessForm" style="display:none;">
    <!-- 사업자번호 입력 -->
</div>

<script>
function showPersonalForm(){
    document.getElementById("personalForm").style.display="block";
    document.getElementById("businessForm").style.display="none";
}

function showBusinessForm(){
    document.getElementById("personalForm").style.display="none";
    document.getElementById("businessForm").style.display="block";
}
</script>
