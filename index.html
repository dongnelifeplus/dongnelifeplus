<html>

<head>
<meta charset="utf-8">

<style>

body{
    font-family:Arial;
    max-width:900px;
    margin:auto;
    padding:20px;
    background:#f5f7fb;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.score{
    font-size:48px;
    color:#2563eb;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:12px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}

.benefit-card{
    background:white;
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
}

</style>

</head>

<body>

<h1>우리동네라이프플러스</h1>

<div class="card">

<h2>내 정보 등록</h2>

<input id="name" placeholder="이름">

<input id="age" type="number" placeholder="나이">

<select id="gender">
<option value="남성">남성</option>
<option value="여성">여성</option>
</select>

<select id="area">
<option value="관양동">관양동</option>
<option value="평촌동">평촌동</option>
<option value="비산동">비산동</option>
<option value="범계동">범계동</option>
</select>

<select id="family">
<option value="1인">1인 가구</option>
<option value="2인">2인 가구</option>
<option value="3인">3인 이상 가구</option>
</select>

<select id="income">
<option value="100이하">월소득 100만원 이하</option>
<option value="200이하">월소득 200만원 이하</option>
<option value="300이하">월소득 300만원 이하</option>
<option value="500이하">월소득 500만원 이하</option>
<option value="500초과">월소득 500만원 초과</option>
</select>

<select id="job">
<option value="직장인">직장인</option>
<option value="자영업자">자영업자</option>
<option value="프리랜서">프리랜서</option>
<option value="학생">학생</option>
<option value="무직">무직</option>
</select>

<select id="house">
<option value="자가">자가</option>
<option value="전세">전세</option>
<option value="월세">월세</option>
<option value="공공임대">공공임대</option>
</select>

<select id="business">
<option value="없음">사업자 없음</option>
<option value="개인사업자">개인사업자</option>
<option value="법인사업자">법인사업자</option>
</select>

<select id="marriage">
<option value="미혼">미혼</option>
<option value="기혼">기혼</option>
</select>

<select id="children">
<option value="0">자녀 없음</option>
<option value="1">자녀 1명</option>
<option value="2">자녀 2명</option>
<option value="3">자녀 3명 이상</option>
</select>

<select id="car">
<option value="yes">차량 있음</option>
<option value="no">차량 없음</option>
</select>

<button onclick="registerUser()">등록하기</button>

</div>

<div class="card">
<h2>사용자</h2>
<div id="users"></div>
</div>

<div class="card">
<h2>Opportunity Score</h2>
<div class="score" id="score">0</div>
</div>

<div class="card">
<h2>추천 혜택</h2>
<div id="benefits"></div>
</div>

<script>

async function registerUser(){

    const name=document.getElementById("name").value;
    const age=document.getElementById("age").value;
    const gender=document.getElementById("gender").value;
    const area=document.getElementById("area").value;
    const family=document.getElementById("family").value;
    const income=document.getElementById("income").value;
    const job=document.getElementById("job").value;
    const house=document.getElementById("house").value;
    const business=document.getElementById("business").value;
    const marriage=document.getElementById("marriage").value;
    const children=document.getElementById("children").value;
    const car=document.getElementById("car").value;

    await fetch(
        `/api/register?name=${name}&age=${age}&gender=${gender}&area=${area}&family=${family}&income=${income}&job=${job}&house=${house}&business=${business}&marriage=${marriage}&children=${children}&car=${car}`
    );

    loadUsers();
}

async function loadUsers(){

    const res=await fetch("/api/users");
    const users=await res.json();

    let html="";

    users.forEach(user=>{

        html+=`
        <div class="benefit-card">
        <b>${user.name}</b><br>
        ${user.age}세 / ${user.area}<br>
        ${user.job}
        </div>
        `;
    });

    document.getElementById("users").innerHTML=html;
}

loadUsers();

</script>

</body>
</html>
