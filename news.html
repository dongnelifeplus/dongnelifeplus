<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>우리동네라이프플러스 - 맞춤 혜택</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
    background: #f5f7fb;
}
.card {
    background: white;
    padding: 15px 20px;
    margin-bottom: 12px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
button {
    padding: 6px 10px;
    margin-left: 6px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}
.status {
    font-weight: bold;
    padding: 3px 6px;
    border-radius: 6px;
    color: white;
    display: inline-block;
    font-size: 12px;
}
.status-green { background-color: #22c55e; }
.status-orange { background-color: #f97316; }
.status-red { background-color: #dc2626; }
.flex-between {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>
</head>
<body>

<h2>👤 내 맞춤 혜택</h2>

<div id="benefits"></div>

<script>
async function loadBenefits(){
    const res = await fetch("/posts.json");
    const data = await res.json();

    // 카드 우선순위: 최우선추천 → 마감임박 → 적합도순
    data.sort((a,b)=>{
        if(a.priority && b.priority){
            return b.priority - a.priority;
        }
        return (b.fit||0) - (a.fit||0);
    });

    let html = "";

    data.forEach(item => {
        html += `
        <div class="card">
            <div class="flex-between" style="margin-bottom:3px;">
                <div style="display:flex;align-items:center;gap:6px;font-size:12px;">
                    <span class="status ${item.status_color}">
                        ${item.status} ${item.dday} (${item.start_date}~${item.end_date})
                    </span>
                </div>
                <div style="display:flex;gap:6px;">
                    <button onclick="saveFavorite('${item.title}')">★</button>
                    <button onclick="savePlan('${item.title}')">🛒</button>
                    <button onclick="saveAlert('${item.title}')">🔔</button>
                </div>
            </div>
            <h3 style="margin:2px 0;font-size:16px;">${item.title}</h3>
            <div style="margin:0;font-size:13px;color:#2563eb;">${item.eligibility}</div>
            <p style="margin:2px 0 0 0;font-size:13px;">${item.news_content}</p>
        </div>
        `;
    });

    document.getElementById("benefits").innerHTML = html;
}

async function saveFavorite(title){
    await fetch("/api/favorite",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title:title, created:new Date()})
    });
    alert("Favorite Saved");
}
async function savePlan(title){
    await fetch("/api/plan",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title:title, created:new Date()})
    });
    alert("Plan Saved");
}
async function saveAlert(title){
    await fetch("/api/alert",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title:title, created:new Date()})
    });
    alert("Alert Saved");
}

loadBenefits();
</script>

</body>
</html>
