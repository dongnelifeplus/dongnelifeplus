<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>사업자 숨은 돈 진단</title>

<style>
body{font-family:Arial;background:#f5f7fb;max-width:900px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
input,select{width:100%;padding:12px;margin-bottom:12px}
button{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer}
.result{background:#eff6ff;padding:15px;border-radius:10px}
</style>
</head>
<body>

<div class="card">
<h1>사업자 숨은 돈 진단</h1>
<p>사업자등록번호와 업종/지역을 입력하면 받을 가능성이 높은 지원사업을 추천합니다.</p>

<input id="bizno" placeholder="사업자등록번호">

<select id="industry">
<option value="">업종 선택</option>
<option>소매업</option>
<option>음식점</option>
<option>서비스업</option>
<option>제조업</option>
<option>IT</option>
</select>

<input id="area" placeholder="지역 (예: 안양시)">

<button onclick="diagnosis()">진단 시작</button>
</div>

<div class="card">
<h2>추천 결과</h2>
<div id="result" class="result">진단 전</div>
</div>

<script>
// JSON 파일 불러오기 (동일 폴더에 business_rules.json)
async function loadRules() {
    const res = await fetch("business_rules.json");
    return await res.json();
}

async function diagnosis() {
    const bizno = document.getElementById("bizno").value.trim();
    const industry = document.getElementById("industry").value;
    const area = document.getElementById("area").value.trim();

    if (!bizno || !industry || !area) {
        alert("사업자번호, 업종, 지역을 모두 입력해주세요.");
        return;
    }

    const rules = await loadRules();
    let matches = [];

    rules.forEach(rule => {
        if (rule.industry === industry && rule.area === area) {
            matches = rule.support;
        }
    });

    if (matches.length === 0) {
        matches.push("해당 조건의 추천 지원사업이 없습니다.");
    }

    document.getElementById("result").innerHTML = matches.join("<br>");
}
</script>

</body>
</html>
